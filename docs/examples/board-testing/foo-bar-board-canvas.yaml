apiVersion: v1
kind: Canvas
metadata:
  name: Foo Bar Board Tester
  description: Submit a prompt and append a randomized task row to canvas memory for board-panel testing.
spec:
  nodes:
    - id: submit-task
      name: Submit task
      type: TYPE_TRIGGER
      component: start
      configuration:
        templates:
          - name: task
            parameters:
              - name: prompt
                title: Task
                type: text
                placeholder: Describe a small test task…
            payload:
              title: '{{ parameters["prompt"] }}'
      position:
        x: 180
        "y": 240
      isCollapsed: false
    - id: add-random-task
      name: Add randomized task
      type: TYPE_ACTION
      component: addMemory
      configuration:
        namespace: foo_bar_tasks
        valueList:
          - name: id
            value: '{{ "task-" + string(int(now().Unix())) }}'
          - name: title
            value: '{{ $["Submit task"].data.title }}'
          - name: status
            value: '{{ int(now().Unix()) % 4 == 0 ? "Backlog" : int(now().Unix()) % 4 == 1 ? "In Progress" : int(now().Unix()) % 4 == 2 ? "Review" : "Done" }}'
          - name: owner
            value: '{{ int(now().Unix()) % 3 == 0 ? "Foo" : int(now().Unix()) % 3 == 1 ? "Bar" : "Baz" }}'
          - name: priority
            value: '{{ int(now().Unix()) % 3 + 1 }}'
          - name: createdAt
            value: "{{ now() }}"
      position:
        x: 700
        "y": 240
      isCollapsed: false
  edges:
    - sourceId: submit-task
      targetId: add-random-task
      channel: task
