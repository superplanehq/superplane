apiVersion: v1
kind: Console
metadata:
  name: Foo Bar Board Tester
spec:
  panels:
    - id: add-task
      type: nodes
      content:
        title: Add a board card
        nodes:
          - node: submit-task
            description: Each submission appends a task with randomized status, owner, and priority.
            showRun: true
            triggerName: task
            formMode: inline
            showNodeLabel: false
            showFieldLabels: false
            submitLabel: Add task
    - id: task-board
      type: board
      content:
        title: Foo Bar tasks
        dataSource:
          kind: memory
          namespace: foo_bar_tasks
        render:
          kind: board
          groupBy: status
          lanes:
            - value: Backlog
              color: gray
            - value: In Progress
              color: blue
            - value: Review
              color: yellow
            - value: Done
              color: green
          card:
            titleField: title
            fields:
              - field: owner
                label: Owner
                format: badge
              - field: priority
                label: Priority
                format: number
              - field: createdAt
                label: Added
                format: relative
          sort:
            field: createdAt
            order: desc
          emptyMessage: Submit a task to populate the board.
  layout:
    - i: add-task
      x: 0
      "y": 0
      w: 4
      h: 7
      minW: 3
      minH: 5
    - i: task-board
      x: 4
      "y": 0
      w: 8
      h: 12
      minW: 6
      minH: 7
