metadata:
  name: "Agentic DevOps control loop"
  description: "Manual-driven loop: structure intent with AI, call an external orchestrator API (OpenAI Symphony-style), apply policy filters, pause for human approval, run GitHub Actions and/or Cursor agents, then verify health with Dash0."
  isTemplate: true
spec:
  nodes:
    - id: "ann-agentic-control-w4k2n8"
      name: "Note"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 260
        text: "### Control layer\n\nThe **Structure task intent** node uses **OpenAI** to turn a free-form task into **structured JSON text** (for example priority and constraints).\n\nConnect your OpenAI integration in the node sidebar, then tune the prompt to match your policy vocabulary.\n\nSuperPlane represents branching with **components and edges**, not inline `if` blocks in YAML."
        width: 380
      metadata: null
      position:
        x: 120
        "y": 24
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""
    - id: "ann-agentic-orch-h7p3m1"
      name: "Note"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 300
        text: "### Orchestration (Symphony sidecar)\n\n**Symphony API (HTTP)** sends a **GET** request to your long-running Symphony (or similar) process. OpenAI’s Symphony exposes an optional JSON API when started with `--port` (for example `/api/v1/state`).\n\nReplace the **URL** with your Symphony base URL and add **headers** if you use auth. SuperPlane does not ship a dedicated Symphony integration today: this is the supported **HTTP** pattern."
        width: 380
      metadata: null
      position:
        x: 520
        "y": 24
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""
    - id: "ann-agentic-gov-b2n9q4"
      name: "Note"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 240
        text: "### Governance\n\n**Policy gate** is a **Filter** that evaluates a boolean **expression** on payload fields (for example substrings in the model output). Adjust the expression to encode **priority**, **risk**, or **environment** rules.\n\nFalse stops the branch without emitting downstream—use this to enforce guardrails before a human or execution step."
        width: 380
      metadata: null
      position:
        x: 920
        "y": 24
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""
    - id: "ann-agentic-human-j5t8w2"
      name: "Note"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 240
        text: "### Human loop\n\n**Human approval** pauses the run until someone **approves** or **rejects**.\n\n- Edges on the **approved** channel continue to automated execution.\n- Edges on the **rejected** channel model *reject strategy*—here they route to a **Cursor Cloud Agent** for an alternative path."
        width: 380
      metadata: null
      position:
        x: 1320
        "y": 24
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""
    - id: "ann-agentic-exec-c9v3k6"
      name: "Note"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 280
        text: "### Execution\n\n**Run GitHub workflow** dispatches Actions (tests, deploy, or rollback workflows) and waits for completion.\n\n**Cursor alternative path** launches a **Cursor Cloud Agent** when approval is rejected—configure repository/PR settings in the sidebar.\n\nBoth require their respective integrations."
        width: 380
      metadata: null
      position:
        x: 1720
        "y": 24
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""
    - id: "ann-agentic-fb-m2r7p5"
      name: "Note"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 300
        text: "### Feedback\n\nAfter a successful workflow, **Wait** gives the system time to settle, then **Dash0 List Issues** reads observability issue signals.\n\nUse the **clear**, **degraded**, and **critical** channels to branch notifications or remediation. **HTTP: incident webhook** is a generic receiver—swap the URL for Slack, PagerDuty, or your internal bridge."
        width: 400
      metadata: null
      position:
        x: 2120
        "y": 24
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""
    - id: "ann-agentic-learn-d8f4h1"
      name: "Note"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 220
        text: "### Learning\n\nTreat this template as a **skeleton**: capture outcomes (approvals, failures, Dash0 states) and periodically **export YAML** from the UI in dev or connect downstream analytics.\n\nLinear, ticketing, or experiment tracking live outside SuperPlane unless you add integrations or webhook triggers."
        width: 400
      metadata: null
      position:
        x: 2560
        "y": 24
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""
