    - id: "structure-task-openai-8d2nw"
      name: "Structure task intent"
      type: "TYPE_COMPONENT"
      configuration:
        input: |
          Turn the following manual-run context into ONE JSON object with keys:
          - summary (string)
          - priority ("high" | "medium" | "low")
          - constraints (array of strings)
          - suggested_checks (array of strings)

          Rules:
          - Output JSON only. No Markdown fences.
          - If data is missing, still return valid JSON with best-effort defaults.

          Context: {{ root().data }}
        model: "gpt-5.2"
      metadata: null
      position:
        x: 520
        "y": 380
      component:
        name: "openai.textPrompt"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""
