metadata:
  name: "Incident Copilot Demo"
  description: "Simplified demo: Manual trigger with mock incident data → Claude AI triage → Slack evidence pack. Click Run to fire."
  isTemplate: false
spec:
  nodes:
    - id: "start-start-dm01"
      name: "Run with mock incident"
      type: "TYPE_TRIGGER"
      configuration:
        templates:
          - name: "P1 API Gateway Incident"
            payload:
              incident:
                id: "PGR0VU2"
                title: "API Gateway: 5xx error rate spike to 15% on /api/v1/orders"
                status: "triggered"
                urgency: "high"
                html_url: "https://acme.pagerduty.com/incidents/PGR0VU2"
                created_at: "2026-03-28T14:30:00Z"
                priority:
                  summary: "P1"
                service:
                  summary: "API Gateway (Production)"
                assignees:
                  - summary: "Dragan Petrovic (On-Call SRE)"
                body:
                  details: "5xx error rate spiked from 0.1% to 15.3% at 14:28 UTC. Affects /api/v1/orders endpoint. 1,247 users impacted. Correlated with deployment deploy-api-v2.14.3 at 14:25 UTC."
              recent_deploy:
                tag_name: "v2.14.3"
                name: "Release v2.14.3 - Order Service Refactor"
                body: "Refactored order validation logic. Migrated to new payment gateway client. Updated database connection pooling from 20 to 50."
                published_at: "2026-03-28T14:25:30Z"
              metrics:
                error_rate_5xx: "15.3%"
                latency_p99: "4500ms"
                request_count_drop: "from 15234 to 6721"
      metadata: null
      position:
        x: 200
        "y": 400
      component: null
      blueprint: null
      trigger:
        name: "start"
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "component-node-ai01"
      name: "AI Triage Assessment"
      type: "TYPE_COMPONENT"
      configuration:
        model: "claude-sonnet-4-20250514"
        maxTokens: 4096
        temperature: 0.3
        systemMessage: "You are an expert SRE incident triage assistant. Produce a structured triage report with: 1) SEVERITY ASSESSMENT (P1-P4 with justification), 2) LIKELY ROOT CAUSE (top 3 hypotheses ranked by probability), 3) AFFECTED SYSTEMS, 4) RECOMMENDED ACTIONS (ordered by priority), 5) ESCALATION RECOMMENDATION. Be concise. Use bullet points."
        prompt: "Analyze the following production incident data and provide a structured triage report.\n\nFull incident context:\n{{ toJSON(root()) }}"
      metadata: null
      position:
        x: 700
        "y": 400
      component:
        name: "claude.textPrompt"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "component-node-sl01"
      name: "Send to Slack"
      type: "TYPE_COMPONENT"
      configuration:
        channel: "C0APV7H889F"
        text: ":rotating_light: *INCIDENT TRIAGE — AUTO-GENERATED*\n\n{{ $[\"AI Triage Assessment\"].data.text }}\n\n---\n:clock1: _Triage generated by SuperPlane Incident Copilot_"
      metadata: null
      position:
        x: 1200
        "y": 400
      component:
        name: "slack.sendTextMessage"
      blueprint: null
      trigger: null
      widget: null
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "annotation-annotation-dm1a"
      name: "annotation"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 200
        text: "### 1. Click Run\n\nThe Manual Run trigger has a pre-loaded P1 incident payload with mock PagerDuty, GitHub deploy, and Datadog metrics data.\n\nClick the **Run** button to fire the workflow."
        width: 400
      metadata: null
      position:
        x: 150
        "y": 130
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "annotation-annotation-dm2b"
      name: "annotation2"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 200
        text: "### 2. AI analyzes the incident\n\nClaude receives all incident context and produces a structured severity assessment with root cause hypotheses and recommended actions."
        width: 400
      metadata: null
      position:
        x: 650
        "y": 130
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

    - id: "annotation-annotation-dm3c"
      name: "annotation3"
      type: "TYPE_WIDGET"
      configuration:
        color: "yellow"
        height: 200
        text: "### 3. Evidence pack to Slack\n\nThe AI triage report is posted to #hackathon-demo as a structured evidence pack with severity, root cause, and recommended actions."
        width: 400
      metadata: null
      position:
        x: 1150
        "y": 130
      component: null
      blueprint: null
      trigger: null
      widget:
        name: "annotation"
      isCollapsed: false
      integration: null
      errorMessage: ""
      warningMessage: ""

  edges:
    - sourceId: "start-start-dm01"
      targetId: "component-node-ai01"
      channel: "default"
    - sourceId: "component-node-ai01"
      targetId: "component-node-sl01"
      channel: "default"
