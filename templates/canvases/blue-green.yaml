metadata:
  name: Blue/Green Deploy
  description: Blue/green canary deployment pipeline for multi-service apps on Render
    with Cloudflare traffic routing and Dash0 observability.
  isTemplate: false
spec:
  nodes:
  - id: check-env
    name: Blue is Live?
    type: TYPE_ACTION
    configuration:
      expression: previous().data.values[0].key == 'blue'
    position:
      x: 2040
      y: 1540
    component: if
    isCollapsed: false
  - id: canary-fork
    name: Canary Fork
    type: TYPE_ACTION
    configuration:
      expression: $["Read Live Env"].data.values[0].key == "blue"
    position:
      x: 3960
      y: 1540
    component: if
    isCollapsed: false
  - id: on-push-main
    name: Push to Main
    type: TYPE_TRIGGER
    configuration:
      refs:
      - type: equals
        value: refs/heads/main
      repository: webapp
    position:
      x: 120
      y: 1540
    isCollapsed: false
    metadata:
      repository:
        id: 123456789
        name: webapp
        url: https://github.com/acme-corp/webapp
  - id: canary-30-blue
    name: Canary 30% Blue
    type: TYPE_ACTION
    configuration:
      authorization:
        credential:
          key: token
          secret: cloudflare-api-token
        type: bearer
      contentType: text/plain
      method: PUT
      text: '{"green_weight": 0.7, "blue_weight": 0.3}'
      timeoutSeconds: 10
      url: https://api.cloudflare.com/client/v4/accounts/a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4/storage/kv/namespaces/f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3/values/weights
    position:
      x: 4600
      y: 1720
    component: http
    isCollapsed: false
  - id: annotation-canary
    name: Canary Traffic
    type: TYPE_WIDGET
    configuration:
      color: yellow
      height: 244
      text: '## Canary Traffic Shift


        Cloudflare load balancer shifts 30% of production traffic to the newly deployed
        env. The remaining 70% stays on the current live env.


        This is the safety net — real users hit the new code, but most traffic is
        still on the known-good version.'
      width: 412
    position:
      x: 4560
      y: 1032
    component: annotation
    isCollapsed: false
  - id: save-state
    name: Save New Env
    type: TYPE_ACTION
    configuration:
      matchList:
      - name: key
        value: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "green" : "blue"
          }}'
      namespace: blue-green-state
      valueList:
      - name: key
        value: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "green" : "blue"
          }}'
      - name: active
        value: 'true'
      - name: api_deploy
        value: '{{ $["Deploy API"].data.deployId }}'
      - name: web_deploy
        value: '{{ $["Deploy Web"].data.deployId }}'
      - name: worker_deploy
        value: '{{ $["Deploy Worker"].data.deployId }}'
    position:
      x: 9080
      y: 1360
    component: upsertMemory
    isCollapsed: false
  - id: annotation-overview
    name: Overview
    type: TYPE_WIDGET
    configuration:
      color: blue
      height: 208
      text: '## Blue/Green Canary Pipeline


        Fully automated deploy-and-verify pipeline for a multi-service app on Render.


        **Flow:** Push to main → detect live env → deploy to idle → shift 30% traffic
        → run health checks → promote to 100% or rollback.


        **Integrations:** Render (deploys), Cloudflare (traffic routing), Dash0 (error
        monitoring), GitHub Actions (smoke tests)'
      width: 568
    position:
      x: 24
      y: 1200
    component: annotation
    isCollapsed: false
  - id: revert-worker
    name: Revert Worker
    type: TYPE_ACTION
    configuration:
      deployId: '{{ $["Read Deploy IDs"].data.values[0].worker_deploy }}'
      service: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "srv-worker-blue-abc123"
        : "srv-worker-green-def456" }}'
    position:
      x: 9720
      y: 2260
    component: render.rollbackDeploy
    isCollapsed: false
  - id: health-check
    name: Health OK?
    type: TYPE_ACTION
    configuration:
      expression: $["Smoke Tests"].data.conclusion == "success" && $["Dash0 Synthetic"].data.metrics.lastOutcome
        == "Healthy" && float($["Canary Error Rate"].data.result[0].value[1]) <= 1
    position:
      x: 7160
      y: 1540
    component: if
    isCollapsed: false
  - id: annotation-deploy
    name: Parallel Deploy
    type: TYPE_WIDGET
    configuration:
      color: green
      height: 220
      text: '## Parallel Deploy to Idle Env


        API, Web, and Worker services deploy simultaneously via Render''s deploy API.
        The `if` node routes to the correct service IDs based on which env is idle.


        Merge node waits for all 3 deploys to complete before proceeding. If any deploy
        fails, the pipeline stops here.'
      width: 532
    position:
      x: 2616
      y: 864
    component: annotation
    isCollapsed: false
  - id: rollback-to-blue
    name: Rollback to Blue
    type: TYPE_ACTION
    configuration:
      authorization:
        credential:
          key: token
          secret: cloudflare-api-token
        type: bearer
      contentType: text/plain
      method: PUT
      text: '{"green_weight": 0, "blue_weight": 1}'
      timeoutSeconds: 10
      url: https://api.cloudflare.com/client/v4/accounts/a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4/storage/kv/namespaces/f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3/values/weights
    position:
      x: 8440
      y: 1720
    component: http
    isCollapsed: false
  - id: merge-deploys
    name: Wait for Deploys
    type: TYPE_ACTION
    configuration:
      enableStopIf: false
      enableTimeout: true
      executionTimeout:
        unit: minutes
        value: 15
    position:
      x: 3320
      y: 1540
    component: merge
    isCollapsed: false
  - id: notify-success
    name: Deployed ✅
    type: TYPE_ACTION
    configuration:
      channel: '1496141530417598635'
      embedColor: '#00FF00'
      embedDescription: '**app.example.com** canary passed, traffic switched.


        **Commit:** {{ root().data.head_commit.message }}

        **By:** {{ root().data.pusher.name }}'
      embedTitle: 🟢 Canary Deploy Complete
      embedUrl: '{{ root().data.head_commit.url }}'
    position:
      x: 9720
      y: 820
    component: discord.sendTextMessage
    isCollapsed: false
    metadata:
      channel:
        id: '1496141530417598635'
        name: alex-test
      hasEmbed: true
  - id: promote-fork
    name: Promote Fork
    type: TYPE_ACTION
    configuration:
      expression: $["Read Live Env"].data.values[0].key == "blue"
    position:
      x: 7800
      y: 1360
    component: if
    isCollapsed: false
  - id: promote-blue
    name: Promote Blue
    type: TYPE_ACTION
    configuration:
      authorization:
        credential:
          key: token
          secret: cloudflare-api-token
        type: bearer
      contentType: text/plain
      method: PUT
      text: '{"green_weight": 0, "blue_weight": 1}'
      timeoutSeconds: 10
      url: https://api.cloudflare.com/client/v4/accounts/a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4/storage/kv/namespaces/f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3/values/weights
    position:
      x: 8440
      y: 1360
    component: http
    isCollapsed: false
  - id: deploy-api
    name: Deploy API
    type: TYPE_ACTION
    configuration:
      clearCache: false
      service: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "srv-api-blue-abc123"
        : "srv-api-green-def456" }}'
    position:
      x: 2680
      y: 1180
    component: render.deploy
    isCollapsed: false
  - id: read-state
    name: Read Live Env
    type: TYPE_ACTION
    configuration:
      matchList:
      - name: active
        value: 'true'
      namespace: blue-green-state
      resultMode: latest
    position:
      x: 760
      y: 1540
    component: readMemory
    isCollapsed: false
  - id: rollback-fork
    name: Rollback Fork
    type: TYPE_ACTION
    configuration:
      expression: $["Read Live Env"].data.values[0].key == "blue"
    position:
      x: 7800
      y: 1720
    component: if
    isCollapsed: false
  - id: verify-health
    name: Verify Health
    type: TYPE_ACTION
    configuration:
      enableStopIf: false
      enableTimeout: true
      executionTimeout:
        unit: minutes
        value: 15
    position:
      x: 6520
      y: 1540
    component: merge
    isCollapsed: false
  - id: read-deploy-ids
    name: Read Deploy IDs
    type: TYPE_ACTION
    configuration:
      matchList:
      - name: key
        value: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "green" : "blue"
          }}'
      namespace: blue-green-state
      resultMode: latest
    position:
      x: 9080
      y: 1720
    component: readMemory
    isCollapsed: false
  - id: canary-30-green
    name: Canary 30% Green
    type: TYPE_ACTION
    configuration:
      authorization:
        credential:
          key: token
          secret: cloudflare-api-token
        type: bearer
      contentType: text/plain
      method: PUT
      text: '{"green_weight": 0.3, "blue_weight": 0.7}'
      timeoutSeconds: 10
      url: https://api.cloudflare.com/client/v4/accounts/a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4/storage/kv/namespaces/f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3/values/weights
    position:
      x: 4600
      y: 1360
    component: http
    isCollapsed: false
  - id: init-state
    name: 'Init: Blue is Live'
    type: TYPE_ACTION
    configuration:
      matchList:
      - name: key
        value: blue
      namespace: blue-green-state
      valueList:
      - name: key
        value: blue
      - name: active
        value: 'true'
    position:
      x: 1400
      y: 1630
    component: upsertMemory
    isCollapsed: false
  - id: annotation-decision
    name: Promote or Rollback
    type: TYPE_WIDGET
    configuration:
      color: purple
      height: 212
      text: '## Promote or Rollback


        **All checks pass →** Shift 100% traffic to new env, save new state to canvas
        memory, deactivate old env. Done ✅


        **Any check fails →** Revert Cloudflare weights to 100% on the old env, then
        rollback each Render service to its previous deploy ID (stored in memory).
        No manual intervention needed.'
      width: 536
    position:
      x: 7728
      y: 1008
    component: annotation
    isCollapsed: false
  - id: run-smoke
    name: Smoke Tests
    type: TYPE_ACTION
    configuration:
      inputs:
      - name: api_url
        value: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "https://webapp-api-green.onrender.com"
          : "https://webapp-api-blue.onrender.com" }}'
      - name: web_url
        value: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "https://webapp-web-green.onrender.com"
          : "https://webapp-web-blue.onrender.com" }}'
      ref: main
      repository: webapp
      workflowFile: .github/workflows/smoke-test.yml
    position:
      x: 5240
      y: 1180
    component: github.runWorkflow
    isCollapsed: false
    metadata:
      repository:
        id: 123456789
        name: webapp
        url: https://github.com/acme-corp/webapp
  - id: save-old-env
    name: Deactivate Old Env
    type: TYPE_ACTION
    configuration:
      matchList:
      - name: key
        value: '{{ $["Read Live Env"].data.values[0].key }}'
      namespace: blue-green-state
      valueList:
      - name: key
        value: '{{ $["Read Live Env"].data.values[0].key }}'
      - name: active
        value: 'false'
      - name: api_deploy
        value: '{{ $["Read Live Env"].data.values[0].api_deploy }}'
      - name: web_deploy
        value: '{{ $["Read Live Env"].data.values[0].web_deploy }}'
      - name: worker_deploy
        value: '{{ $["Read Live Env"].data.values[0].worker_deploy }}'
    position:
      x: 9720
      y: 1180
    component: upsertMemory
    isCollapsed: false
  - id: promote-green
    name: Promote Green
    type: TYPE_ACTION
    configuration:
      authorization:
        credential:
          key: token
          secret: cloudflare-api-token
        type: bearer
      contentType: text/plain
      method: PUT
      text: '{"green_weight": 1, "blue_weight": 0}'
      timeoutSeconds: 10
      url: https://api.cloudflare.com/client/v4/accounts/a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4/storage/kv/namespaces/f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3/values/weights
    position:
      x: 8440
      y: 1000
    component: http
    isCollapsed: false
  - id: dash0-check
    name: Dash0 Synthetic
    type: TYPE_ACTION
    configuration:
      dataset: default
      syntheticCheck: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "aaaaaaaa-bbbb-cccc-dddd-111111111111"
        : "aaaaaaaa-bbbb-cccc-dddd-222222222222" }}'
    position:
      x: 5240
      y: 1540
    component: dash0.getHttpSyntheticCheck
    isCollapsed: false
  - id: deploy-worker
    name: Deploy Worker
    type: TYPE_ACTION
    configuration:
      clearCache: false
      service: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "srv-worker-blue-abc123"
        : "srv-worker-green-def456" }}'
    position:
      x: 2680
      y: 1900
    component: render.deploy
    isCollapsed: false
  - id: revert-web
    name: Revert Web
    type: TYPE_ACTION
    configuration:
      deployId: '{{ $["Read Deploy IDs"].data.values[0].web_deploy }}'
      service: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "srv-web-blue-abc123"
        : "srv-web-green-def456" }}'
    position:
      x: 9720
      y: 1900
    component: render.rollbackDeploy
    isCollapsed: false
  - id: annotation-verify
    name: Health Verification
    type: TYPE_WIDGET
    configuration:
      color: yellow
      height: 240
      text: '## Health Verification (parallel)


        Three checks run simultaneously:


        - **Smoke tests** — GitHub Actions runs API & UI test suite against the new
        env

        - **Dash0 synthetic** — Continuous synthetic monitoring catches availability
        issues

        - **Canary error rate** — After a 5-min soak, queries Dash0 PromQL for 5xx
        error rate. Fails if >1%


        All three must pass. Merge node collects results.'
      width: 696
    position:
      x: 5088
      y: 888
    component: annotation
    isCollapsed: false
  - id: deploy-web
    name: Deploy Web
    type: TYPE_ACTION
    configuration:
      clearCache: false
      service: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "srv-web-blue-abc123"
        : "srv-web-green-def456" }}'
    position:
      x: 2680
      y: 1540
    component: render.deploy
    isCollapsed: false
  - id: revert-api
    name: Revert Api
    type: TYPE_ACTION
    configuration:
      deployId: '{{ $["Read Deploy IDs"].data.values[0].api_deploy }}'
      service: '{{ $["Read Live Env"].data.values[0].key == "blue" ? "srv-api-blue-abc123"
        : "srv-api-green-def456" }}'
    position:
      x: 9720
      y: 1540
    component: render.rollbackDeploy
    isCollapsed: false
  - id: canary-error-check
    name: Canary Error Rate
    type: TYPE_ACTION
    configuration:
      dataset: default
      query: sum(increase(http_server_request_duration_milliseconds_count{http_status_code=~"5.."}[5m]))
        / sum(increase(http_server_request_duration_milliseconds_count[5m])) * 100
        or vector(0)
      type: instant
    position:
      x: 5880
      y: 1720
    component: dash0.queryPrometheus
    isCollapsed: false
  - id: canary-wait
    name: Canary Soak (5 min)
    type: TYPE_ACTION
    configuration:
      mode: interval
      unit: minutes
      waitFor: '5'
    position:
      x: 5240
      y: 1900
    component: wait
    isCollapsed: false
  - id: rollback-to-green
    name: Rollback to Green
    type: TYPE_ACTION
    configuration:
      authorization:
        credential:
          key: token
          secret: cloudflare-api-token
        type: bearer
      contentType: text/plain
      method: PUT
      text: '{"green_weight": 1, "blue_weight": 0}'
      timeoutSeconds: 10
      url: https://api.cloudflare.com/client/v4/accounts/a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4/storage/kv/namespaces/f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3/values/weights
    position:
      x: 8440
      y: 2080
    component: http
    isCollapsed: false
  - id: annotation-env-detection
    name: Environment Detection
    type: TYPE_WIDGET
    configuration:
      color: blue
      height: 176
      text: '## Environment Detection


        Reads canvas memory to find which env (blue or green) is currently live. Deploys
        always target the **idle** env.


        On first run, initializes state with blue as the default live environment.'
      width: 568
    position:
      x: 1296
      y: 1200
    component: annotation
    isCollapsed: false
  edges:
  - sourceId: on-push-main
    targetId: read-state
    channel: default
  - sourceId: read-state
    targetId: check-env
    channel: found
  - sourceId: read-state
    targetId: init-state
    channel: notFound
  - sourceId: init-state
    targetId: check-env
    channel: default
  - sourceId: check-env
    targetId: deploy-api
    channel: 'true'
  - sourceId: check-env
    targetId: deploy-web
    channel: 'true'
  - sourceId: check-env
    targetId: deploy-worker
    channel: 'true'
  - sourceId: check-env
    targetId: deploy-api
    channel: 'false'
  - sourceId: check-env
    targetId: deploy-web
    channel: 'false'
  - sourceId: check-env
    targetId: deploy-worker
    channel: 'false'
  - sourceId: deploy-api
    targetId: merge-deploys
    channel: success
  - sourceId: deploy-web
    targetId: merge-deploys
    channel: success
  - sourceId: deploy-worker
    targetId: merge-deploys
    channel: success
  - sourceId: run-smoke
    targetId: verify-health
    channel: passed
  - sourceId: dash0-check
    targetId: verify-health
    channel: healthy
  - sourceId: dash0-check
    targetId: verify-health
    channel: degraded
  - sourceId: dash0-check
    targetId: verify-health
    channel: critical
  - sourceId: save-state
    targetId: notify-success
    channel: default
  - sourceId: merge-deploys
    targetId: canary-fork
    channel: success
  - sourceId: canary-fork
    targetId: canary-30-green
    channel: 'true'
  - sourceId: canary-fork
    targetId: canary-30-blue
    channel: 'false'
  - sourceId: canary-30-green
    targetId: run-smoke
    channel: success
  - sourceId: canary-30-green
    targetId: dash0-check
    channel: success
  - sourceId: canary-30-green
    targetId: canary-wait
    channel: success
  - sourceId: canary-30-blue
    targetId: run-smoke
    channel: success
  - sourceId: canary-30-blue
    targetId: dash0-check
    channel: success
  - sourceId: canary-30-blue
    targetId: canary-wait
    channel: success
  - sourceId: promote-fork
    targetId: promote-green
    channel: 'true'
  - sourceId: promote-fork
    targetId: promote-blue
    channel: 'false'
  - sourceId: promote-green
    targetId: save-state
    channel: success
  - sourceId: promote-blue
    targetId: save-state
    channel: success
  - sourceId: rollback-fork
    targetId: rollback-to-blue
    channel: 'true'
  - sourceId: rollback-fork
    targetId: rollback-to-green
    channel: 'false'
  - sourceId: canary-wait
    targetId: canary-error-check
    channel: default
  - sourceId: canary-error-check
    targetId: verify-health
    channel: default
  - sourceId: run-smoke
    targetId: verify-health
    channel: failed
  - sourceId: verify-health
    targetId: health-check
    channel: success
  - sourceId: health-check
    targetId: promote-fork
    channel: 'true'
  - sourceId: health-check
    targetId: rollback-fork
    channel: 'false'
  - sourceId: save-state
    targetId: save-old-env
    channel: default
  - sourceId: rollback-to-blue
    targetId: read-deploy-ids
    channel: success
  - sourceId: rollback-to-green
    targetId: read-deploy-ids
    channel: success
  - sourceId: read-deploy-ids
    targetId: revert-api
    channel: found
  - sourceId: read-deploy-ids
    targetId: revert-web
    channel: found
  - sourceId: read-deploy-ids
    targetId: revert-worker
    channel: found
