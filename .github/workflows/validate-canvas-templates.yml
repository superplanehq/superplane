name: "Validate canvas templates"

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-canvas-templates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parse-templates:
    name: "Parse and validate template YAMLs"
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y -qq protobuf-compiler

      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.6
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate Go protobufs
        run: bash scripts/protoc.sh authorization,organizations,integrations,secrets,users,groups,roles,me,configuration,components,actions,triggers,widgets,blueprints,canvases,service_accounts,agents,usage,private/agents

      - name: Validate built-in template canvases
        run: go test ./pkg/templates/ -count=1 -run TestCanvasesTemplatesParse
