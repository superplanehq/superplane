<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Material Icons Fonts -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <script>
      (function () {
        var storageKey = "superplane-theme";
        var preference = "system";
        try {
          var stored = localStorage.getItem(storageKey);
          if (stored === "light" || stored === "dark" || stored === "system") {
            preference = stored;
          }
        } catch (e) {}
        var prefersDark =
          preference === "dark" ||
          (preference === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.style.colorScheme = prefersDark ? "dark" : "light";
        if (prefersDark) {
          document.documentElement.classList.add("dark");
        }
        var favicon = document.querySelector('link[rel="icon"][type="image/svg+xml"]');
        if (favicon) {
          favicon.href = prefersDark ? "/favicon-dark.svg" : "/favicon.svg";
        }
      })();
    </script>

    <script>
      window.SUPERPLANE_SENTRY_DSN = "{{ .SentryDSN }}";
      window.SUPERPLANE_SENTRY_ENVIRONMENT = "{{ .SentryEnvironment }}";
      window.SUPERPLANE_POSTHOG_KEY = "{{ .PostHogKey }}";
      window.SUPERPLANE_DASH0_OTLP_ENDPOINT = "{{ .Dash0WebOTLPEndpoint }}";
      window.SUPERPLANE_DASH0_AUTH_TOKEN = "{{ .Dash0WebAuthToken }}";
      window.SUPERPLANE_DASH0_SERVICE_NAME = "{{ .Dash0WebServiceName }}";
      window.SUPERPLANE_DASH0_ENVIRONMENT = "{{ .Dash0WebEnvironment }}";
      window.SUPERPLANE_SIGNUP_WAITLIST_HUBSPOT_PORTAL_ID = "{{ .SignupWaitlistHubSpotPortalID }}";
      window.SUPERPLANE_SIGNUP_WAITLIST_HUBSPOT_FORM_ID = "{{ .SignupWaitlistHubSpotFormID }}";
      window.SUPERPLANE_SIGNUP_WAITLIST_HUBSPOT_REGION = "{{ .SignupWaitlistHubSpotRegion }}";
    </script>

    <title>SuperPlane</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
