syntax = "proto3";

package Superplane.Canvases;

import "components.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/superplanehq/superplane/pkg/protos/canvases";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Superplane Canvases API";
    version: "1.0";
    description: "API for Superplane canvases";
    contact: {
      name: "API Support";
      email: "support@superplane.com";
    };
  };
  schemes: HTTP;
  schemes: HTTPS;
  consumes: "application/json";
  produces: "application/json";
};

service Canvases {
  rpc ListCanvases(ListCanvasesRequest) returns (ListCanvasesResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvases";
      description: "Returns a list of all canvases";
      tags: "Canvas";
    };
  }

  rpc CreateCanvas(CreateCanvasRequest) returns (CreateCanvasResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create canvas";
      description: "Creates a new canvas";
      tags: "Canvas";
    };
  }

  rpc DescribeCanvas(DescribeCanvasRequest) returns (DescribeCanvasResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Describe canvas";
      description: "Returns a canvas by ID";
      tags: "Canvas";
    };
  }

  rpc UpdateCanvas(UpdateCanvasRequest) returns (UpdateCanvasResponse) {
    option (google.api.http) = {
      put: "/api/v1/canvases/{id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update canvas";
      description: "Updates canvas metadata";
      tags: "Canvas";
    };
  }

  rpc CreateCanvasVersion(CreateCanvasVersionRequest) returns (CreateCanvasVersionResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/versions"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create canvas version";
      description: "Creates a user-owned canvas version from the current live canvas";
      tags: "CanvasVersion";
    };
  }

  rpc ListCanvasVersions(ListCanvasVersionsRequest) returns (ListCanvasVersionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/versions"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvas versions";
      description: "Lists all versions for a canvas";
      tags: "CanvasVersion";
    };
  }

  rpc DescribeCanvasVersion(DescribeCanvasVersionRequest) returns (DescribeCanvasVersionResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/versions/{version_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Describe canvas version";
      description: "Returns one canvas version by ID";
      tags: "CanvasVersion";
    };
  }

  rpc UpdateCanvasVersion(UpdateCanvasVersionRequest) returns (UpdateCanvasVersionResponse) {
    option (google.api.http) = {
      put: "/api/v1/canvases/{canvas_id}/versions/{version_id}"
      body: "*"
      additional_bindings {
        put: "/api/v1/canvases/{canvas_id}/versions"
        body: "*"
      }
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update canvas version";
      description: "Updates a user-owned canvas version; if version_id is omitted, updates the live canvas when versioning is disabled";
      tags: "CanvasVersion";
    };
  }

  rpc CreateCanvasChangeRequest(CreateCanvasChangeRequestRequest) returns (CreateCanvasChangeRequestResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/change-requests"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create canvas change request";
      description: "Creates a change request for a draft canvas version";
      tags: "CanvasChangeRequest";
    };
  }

  rpc ListCanvasChangeRequests(ListCanvasChangeRequestsRequest) returns (ListCanvasChangeRequestsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/change-requests"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvas change requests";
      description: "Lists change requests for a canvas";
      tags: "CanvasChangeRequest";
    };
  }

  rpc DescribeCanvasChangeRequest(DescribeCanvasChangeRequestRequest) returns (DescribeCanvasChangeRequestResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/change-requests/{change_request_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Describe canvas change request";
      description: "Returns one canvas change request by ID";
      tags: "CanvasChangeRequest";
    };
  }

  rpc ActOnCanvasChangeRequest(ActOnCanvasChangeRequestRequest) returns (ActOnCanvasChangeRequestResponse) {
    option (google.api.http) = {
      patch: "/api/v1/canvases/{canvas_id}/change-requests/{change_request_id}/actions"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Act on canvas change request";
      description: "Applies an action (approve, unapprove, reject, reopen, publish) to a change request";
      tags: "CanvasChangeRequest";
    };
  }

  rpc ResolveCanvasChangeRequest(ResolveCanvasChangeRequestRequest) returns (ResolveCanvasChangeRequestResponse) {
    option (google.api.http) = {
      patch: "/api/v1/canvases/{canvas_id}/change-requests/{change_request_id}/resolve"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Resolve canvas change request conflicts";
      description: "Updates a change request version with a conflict-resolved result";
      tags: "CanvasChangeRequest";
    };
  }

  rpc DeleteCanvas(DeleteCanvasRequest) returns (DeleteCanvasResponse) {
    option (google.api.http) = {
      delete: "/api/v1/canvases/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete canvas";
      description: "Deletes an existing canvas";
      tags: "Canvas";
    };
  }

  rpc ListNodeQueueItems(ListNodeQueueItemsRequest) returns (ListNodeQueueItemsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/queue"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List items in a node's queue";
      description: "Returns a list of items in a node's queue";
      tags: "CanvasNode";
    };
  }

  rpc DeleteNodeQueueItem(DeleteNodeQueueItemRequest) returns (DeleteNodeQueueItemResponse) {
    option (google.api.http) = {
      delete: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/queue/{item_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete item from a node's queue";
      description: "Deletes a specific item in a node's queue";
      tags: "CanvasNode";
    };
  }

  rpc UpdateNodePause(UpdateNodePauseRequest) returns (UpdateNodePauseResponse) {
    option (google.api.http) = {
      patch: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/pause"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Pause or resume node processing";
      description: "Pauses or resumes processing for a canvas node while continuing to queue incoming items";
      tags: "CanvasNode";
    };
  }

  rpc ListNodeExecutions(ListNodeExecutionsRequest) returns (ListNodeExecutionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/executions"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List node executions";
      description: "Returns a list of executions for a specific canvas node";
      tags: "CanvasNode";
    };
  }

  rpc ListNodeEvents(ListNodeEventsRequest) returns (ListNodeEventsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/events"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List node events";
      description: "Returns a list of events for a specific canvas node";
      tags: "CanvasNode";
    };
  }

  rpc EmitNodeEvent(EmitNodeEventRequest) returns (EmitNodeEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/events"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Emit output event for canvas node";
      description: "Emit output event for canvas node";
      tags: "CanvasNode";
    };
  }

  rpc InvokeNodeExecutionAction(InvokeNodeExecutionActionRequest) returns (InvokeNodeExecutionActionResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/executions/{execution_id}/actions/{action_name}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Invoke execution action";
      description: "Invokes a custom action on a canvas node execution";
      tags: "CanvasNodeExecution";
    };
  }

  rpc InvokeNodeTriggerAction(InvokeNodeTriggerActionRequest) returns (InvokeNodeTriggerActionResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/triggers/{node_id}/actions/{action_name}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Invoke trigger action";
      description: "Invokes a custom action on a canvas node trigger";
      tags: "CanvasNode";
    };
  }

  rpc ListChildExecutions(ListChildExecutionsRequest) returns (ListChildExecutionsResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/executions/{execution_id}/children"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List child executions for an execution";
      description: "List child executions for an execution";
      tags: "CanvasNodeExecution";
    };
  }

  rpc CancelExecution(CancelExecutionRequest) returns (CancelExecutionResponse) {
    option (google.api.http) = {
      patch: "/api/v1/canvases/{canvas_id}/executions/{execution_id}/cancel"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Cancel execution";
      description: "Cancels a running canvas node execution";
      tags: "CanvasNodeExecution";
    };
  }

  rpc ResolveExecutionErrors(ResolveExecutionErrorsRequest) returns (ResolveExecutionErrorsResponse) {
    option (google.api.http) = {
      patch: "/api/v1/canvases/{canvas_id}/executions/resolve"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Resolve execution errors";
      description: "Marks canvas node execution errors as resolved";
      tags: "CanvasNodeExecution";
    };
  }

  rpc ListCanvasEvents(ListCanvasEventsRequest) returns (ListCanvasEventsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/events"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvas events";
      description: "Returns a list of root events that triggered executions in a canvas";
      tags: "CanvasEvent";
    };
  }

  rpc ListCanvasMemories(ListCanvasMemoriesRequest) returns (ListCanvasMemoriesResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/memory"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvas memories";
      description: "Returns append-only memory records for a canvas";
      tags: "Canvas";
    };
  }

  rpc DeleteCanvasMemory(DeleteCanvasMemoryRequest) returns (DeleteCanvasMemoryResponse) {
    option (google.api.http) = {
      delete: "/api/v1/canvases/{canvas_id}/memory/{memory_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete canvas memory entry";
      description: "Deletes one memory record by ID from a canvas";
      tags: "Canvas";
    };
  }

  rpc ListEventExecutions(ListEventExecutionsRequest) returns (ListEventExecutionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/events/{event_id}/executions"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List event executions";
      description: "Returns a list of all node executions triggered by a root event";
      tags: "CanvasEvent";
    };
  }

  rpc SendAiMessage(SendAiMessageRequest) returns (SendAiMessageResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/ai/messages"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Generate AI canvas proposal";
      description: "Generates a structured, non-persistent canvas proposal from a natural language prompt";
      tags: "Canvas";
    };
  }
}

message ListCanvasesRequest {
  bool include_templates = 1;
}

message ListCanvasesResponse {
  repeated Canvas canvases = 1;
}

message DescribeCanvasRequest {
  string id = 1;
}

message DescribeCanvasResponse {
  Canvas canvas = 1;
}

message UpdateCanvasRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional bool canvas_versioning_enabled = 4;
  optional CanvasChangeRequestApprovalConfig change_request_approval_config = 5;
}

message UpdateCanvasResponse {
  Canvas canvas = 1;
}

message CreateCanvasRequest {
  Canvas canvas = 1;
}

message CreateCanvasResponse {
  Canvas canvas = 1;
}

message CanvasAutoLayout {
  enum Algorithm {
    ALGORITHM_UNSPECIFIED = 0;
    ALGORITHM_HORIZONTAL = 1;
  }

  enum Scope {
    SCOPE_UNSPECIFIED = 0;
    SCOPE_FULL_CANVAS = 1;
    SCOPE_CONNECTED_COMPONENT = 2;
    SCOPE_EXACT_SET = 3;
  }

  Algorithm algorithm = 1;
  repeated string node_ids = 2;
  Scope scope = 3;
}

message CreateCanvasVersionRequest {
  string canvas_id = 1;
}

message CreateCanvasVersionResponse {
  CanvasVersion version = 1;
}

message ListCanvasVersionsRequest {
  string canvas_id = 1;
  uint32 limit = 2;
  google.protobuf.Timestamp before = 3;
}

message ListCanvasVersionsResponse {
  repeated CanvasVersion versions = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message DescribeCanvasVersionRequest {
  string canvas_id = 1;
  string version_id = 2;
}

message DescribeCanvasVersionResponse {
  CanvasVersion version = 1;
}

message UpdateCanvasVersionRequest {
  string canvas_id = 1;
  string version_id = 2;
  Canvas canvas = 3;
  CanvasAutoLayout auto_layout = 4;
}

message UpdateCanvasVersionResponse {
  CanvasVersion version = 1;
}

message CreateCanvasChangeRequestRequest {
  string canvas_id = 1;
  string version_id = 2;
  string title = 3;
  string description = 4;
}

message CreateCanvasChangeRequestResponse {
  CanvasChangeRequest change_request = 1;
}

message ListCanvasChangeRequestsRequest {
  string canvas_id = 1;
  uint32 limit = 2;
  google.protobuf.Timestamp before = 3;
  string status_filter = 4;
  bool only_mine = 5;
  string query = 6;
}

message ListCanvasChangeRequestsResponse {
  repeated CanvasChangeRequest change_requests = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message DescribeCanvasChangeRequestRequest {
  string canvas_id = 1;
  string change_request_id = 2;
}

message DescribeCanvasChangeRequestResponse {
  CanvasChangeRequest change_request = 1;
}

message ActOnCanvasChangeRequestRequest {
  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_APPROVE = 1;
    ACTION_REJECT = 2;
    ACTION_REOPEN = 3;
    ACTION_PUBLISH = 4;
    ACTION_UNAPPROVE = 5;
  }

  string canvas_id = 1;
  string change_request_id = 2;
  Action action = 3;
}

message ActOnCanvasChangeRequestResponse {
  CanvasChangeRequest change_request = 1;
}

message ResolveCanvasChangeRequestRequest {
  string canvas_id = 1;
  string change_request_id = 2;
  Canvas canvas = 3;
  CanvasAutoLayout auto_layout = 4;
}

message ResolveCanvasChangeRequestResponse {
  CanvasVersion version = 1;
  CanvasChangeRequest change_request = 2;
}

message DeleteCanvasRequest {
  string id = 1;
}

message DeleteCanvasResponse {}

message UserRef {
  string id = 1;
  string name = 2;
}

message Canvas {
  message Metadata {
    string id = 1;
    string organization_id = 2;
    string name = 3;
    string description = 4;
    google.protobuf.Timestamp created_at = 5;
    google.protobuf.Timestamp updated_at = 6;
    UserRef created_by = 7;
    bool is_template = 8;
    bool canvas_versioning_enabled = 9;
    CanvasChangeRequestApprovalConfig change_request_approval_config = 10;
  }

  message Spec {
    repeated Components.Node nodes = 1;
    repeated Components.Edge edges = 2;
  }

  message Status {
    repeated CanvasNodeExecution last_executions = 1;
    repeated CanvasNodeQueueItem next_queue_items = 2;
    repeated CanvasEvent last_events = 3;
  }

  Metadata metadata = 1;
  Spec spec = 2;
  Status status = 3;
}

message CanvasVersion {
  message Metadata {
    string id = 1;
    string canvas_id = 2;
    UserRef owner = 4;
    bool is_published = 6;
    google.protobuf.Timestamp published_at = 7;
    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
  }

  Metadata metadata = 1;
  Canvas.Spec spec = 2;
}

message CanvasChangeRequestDiff {
  repeated string changed_node_ids = 1;
  repeated string conflicting_node_ids = 2;
}

message CanvasChangeRequestApprover {
  enum Type {
    TYPE_UNSPECIFIED = 0;
    TYPE_ANYONE = 1;
    TYPE_USER = 2;
    TYPE_ROLE = 3;
  }

  Type type = 1;
  string user_id = 2;
  string role_name = 3;
}

message CanvasChangeRequestApprovalConfig {
  repeated CanvasChangeRequestApprover items = 1;
}

message CanvasChangeRequestApproval {
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_APPROVED = 1;
    STATE_REJECTED = 2;
    STATE_UNAPPROVED = 3;
  }

  UserRef actor = 1;
  CanvasChangeRequestApprover approver = 2;
  State state = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp invalidated_at = 5;
}

message CanvasChangeRequest {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_OPEN = 1;
    STATUS_PUBLISHED = 2;
    STATUS_REJECTED = 3;
  }

  message Metadata {
    string id = 1;
    string canvas_id = 2;
    string version_id = 3;
    UserRef owner = 4;
    string based_on_version_id = 5;
    Status status = 6;
    google.protobuf.Timestamp published_at = 7;
    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
    string title = 10;
    string description = 11;
    bool is_conflicted = 12;
  }

  Metadata metadata = 1;
  CanvasVersion version = 2;
  CanvasChangeRequestDiff diff = 3;
  repeated CanvasChangeRequestApproval approvals = 4;
}

message ListNodeEventsRequest {
  string canvas_id = 1;
  string node_id = 2;
  uint32 limit = 3;
  google.protobuf.Timestamp before = 4;
}

message ListNodeEventsResponse {
  repeated CanvasEvent events = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message EmitNodeEventRequest {
  string canvas_id = 1;
  string node_id = 2;
  string channel = 3;
  google.protobuf.Struct data = 4;
}

message EmitNodeEventResponse {
  string event_id = 1;
}

message ListNodeQueueItemsRequest {
  string canvas_id = 1;
  string node_id = 2;
  uint32 limit = 3;
  google.protobuf.Timestamp before = 4;
}

message ListNodeQueueItemsResponse {
  repeated CanvasNodeQueueItem items = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message DeleteNodeQueueItemRequest {
  string canvas_id = 1;
  string node_id = 2;
  string item_id = 3;
}

message DeleteNodeQueueItemResponse {}

message UpdateNodePauseRequest {
  string canvas_id = 1;
  string node_id = 2;
  bool paused = 3;
}

message UpdateNodePauseResponse {
  Components.Node node = 1;
}

message ListNodeExecutionsRequest {
  string canvas_id = 1;
  string node_id = 2;
  repeated CanvasNodeExecution.State states = 3;
  repeated CanvasNodeExecution.Result results = 4;
  uint32 limit = 5;
  google.protobuf.Timestamp before = 6;
}

message ListNodeExecutionsResponse {
  repeated CanvasNodeExecution executions = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message ListChildExecutionsRequest {
  string canvas_id = 1;
  string execution_id = 2;
}

message ListChildExecutionsResponse {
  repeated CanvasNodeExecution executions = 1;
}

message CanvasNodeExecution {
  enum State {
    STATE_UNKNOWN = 0;
    STATE_PENDING = 1;
    STATE_STARTED = 2;
    STATE_FINISHED = 3;
  }

  enum Result {
    RESULT_UNKNOWN = 0;
    RESULT_PASSED = 1;
    RESULT_FAILED = 2;
    RESULT_CANCELLED = 3;
  }

  enum ResultReason {
    RESULT_REASON_OK = 0;
    RESULT_REASON_ERROR = 1;
    RESULT_REASON_ERROR_RESOLVED = 2;
  }

  string id = 1;
  string canvas_id = 2;
  string node_id = 3;
  string parent_execution_id = 4;
  string previous_execution_id = 5;
  State state = 6;
  Result result = 7;
  ResultReason result_reason = 8;
  string result_message = 9;
  google.protobuf.Struct input = 10;
  google.protobuf.Struct outputs = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
  google.protobuf.Struct metadata = 14;
  google.protobuf.Struct configuration = 15;
  repeated CanvasNodeExecution child_executions = 16;
  CanvasEvent root_event = 17;
  UserRef cancelled_by = 18;
}

message CanvasNodeQueueItem {
  string id = 1;
  string canvas_id = 2;
  string node_id = 3;
  google.protobuf.Struct input = 4;
  CanvasEvent root_event = 5;
  google.protobuf.Timestamp created_at = 6;
}

message InvokeNodeExecutionActionRequest {
  string canvas_id = 1;
  string execution_id = 2;
  string action_name = 3;
  google.protobuf.Struct parameters = 4;
}

message InvokeNodeExecutionActionResponse {}

message InvokeNodeTriggerActionRequest {
  string canvas_id = 1;
  string node_id = 2;
  string action_name = 3;
  google.protobuf.Struct parameters = 4;
}

message InvokeNodeTriggerActionResponse {
  google.protobuf.Struct result = 1;
}

message ListCanvasEventsRequest {
  string canvas_id = 1;
  uint32 limit = 2;
  google.protobuf.Timestamp before = 3;
}

message ListCanvasEventsResponse {
  repeated CanvasEventWithExecutions events = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message CanvasMemory {
  string id = 1;
  string namespace = 2;
  google.protobuf.Value values = 3;
}

message ListCanvasMemoriesRequest {
  string canvas_id = 1;
}

message ListCanvasMemoriesResponse {
  repeated CanvasMemory items = 1;
}

message DeleteCanvasMemoryRequest {
  string canvas_id = 1;
  string memory_id = 2;
}

message DeleteCanvasMemoryResponse {}

message CanvasEvent {
  string id = 1;
  string canvas_id = 2;
  string node_id = 3;
  string channel = 4;
  string custom_name = 5;
  google.protobuf.Struct data = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CanvasEventWithExecutions {
  string id = 1;
  string canvas_id = 2;
  string node_id = 3;
  string channel = 4;
  google.protobuf.Struct data = 5;
  google.protobuf.Timestamp created_at = 6;
  repeated CanvasNodeExecution executions = 7;
  string custom_name = 8;
}

message ListEventExecutionsRequest {
  string canvas_id = 1;
  string event_id = 2;
}

message ListEventExecutionsResponse {
  repeated CanvasNodeExecution executions = 1;
}

message CancelExecutionRequest {
  string canvas_id = 1;
  string execution_id = 2;
}

message CancelExecutionResponse {}

message ResolveExecutionErrorsRequest {
  string canvas_id = 1;
  repeated string execution_ids = 2;
}

message ResolveExecutionErrorsResponse {}

message CanvasAiNodeContext {
  string id = 1;
  string name = 2;
  string label = 3;
  string type = 4;
}

message CanvasAiBlockContext {
  string name = 1;
  string label = 2;
  string type = 3;
}

message CanvasAiContext {
  repeated CanvasAiNodeContext nodes = 1;
  repeated CanvasAiBlockContext available_blocks = 2;
}

message SendAiMessageRequest {
  string canvas_id = 1;
  string prompt = 2;
  CanvasAiContext canvas_context = 3;
}

message SendAiMessageResponse {
  string assistant_message = 1;
  repeated google.protobuf.Struct operations = 2;
}

//
// Standalone messages
//

message CanvasNodeEventMessage {
  string id = 1;
  string canvas_id = 2;
  string node_id = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message CanvasNodeExecutionMessage {
  string id = 1;
  string canvas_id = 2;
  string node_id = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message CanvasNodeQueueItemMessage {
  string id = 1;
  string canvas_id = 2;
  string node_id = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message CanvasMessage {
  string id = 1;
  string canvas_id = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message CanvasVersionMessage {
  string canvas_id = 1;
  string version_id = 2;
  google.protobuf.Timestamp timestamp = 3;
}
