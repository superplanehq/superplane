syntax = "proto3";

package Superplane.Canvases;

import "components.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/superplanehq/superplane/pkg/protos/canvases";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Superplane Canvases API";
    version: "1.0";
    description: "API for Superplane canvases";
    contact: {
      name: "API Support";
      email: "support@superplane.com";
    };
  };
  schemes: HTTPS;
  schemes: HTTP;
  consumes: "application/json";
  produces: "application/json";
};

service Canvases {
  rpc ListCanvases(ListCanvasesRequest) returns (ListCanvasesResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvases";
      description: "Returns a list of all canvases";
      tags: "Canvas";
    };
  }

  rpc CreateCanvas(CreateCanvasRequest) returns (CreateCanvasResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create canvas";
      description: "Creates a new canvas";
      tags: "Canvas";
    };
  }

  rpc DescribeCanvas(DescribeCanvasRequest) returns (DescribeCanvasResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Describe canvas";
      description: "Returns a canvas by ID";
      tags: "Canvas";
    };
  }

  rpc UpdateCanvas(UpdateCanvasRequest) returns (UpdateCanvasResponse) {
    option (google.api.http) = {
      put: "/api/v1/canvases/{id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update canvas";
      description: "Updates canvas metadata";
      tags: "Canvas";
    };
  }

   rpc GetCanvasRepository(GetCanvasRepositoryRequest) returns (GetCanvasRepositoryResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/repository"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get canvas repository";
      description: "Returns information about the canvas git repository";
      tags: "CanvasRepository";
    };
  }

  rpc ListCanvasRepositoryFiles(ListCanvasRepositoryFilesRequest) returns (ListCanvasRepositoryFilesResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/repository/files"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvas repository files";
      description: "Lists files in the git repository attached to a canvas";
      tags: "CanvasRepository";
    };
  }

  rpc CommitCanvasRepositoryFiles(CommitCanvasRepositoryFilesRequest) returns (CommitCanvasRepositoryFilesResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/repository/commits"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Commit canvas repository files";
      description: "Commits file additions, updates, and deletions directly to a canvas, discarding any existing draft staging for the target version in the same transaction";
      tags: "CanvasRepository";
    };
  }

  rpc StageCanvasRepositoryFile(StageCanvasRepositoryFileRequest) returns (StageCanvasRepositoryFileResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/versions/{version_id}/staging/files"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Stage canvas repository file";
      description: "Writes canvas.yaml/console.yaml edits to a draft version's staging layer without touching the version row";
      tags: "CanvasRepository";
    };
  }

  rpc CreateCanvasVersion(CreateCanvasVersionRequest) returns (CreateCanvasVersionResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/versions"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create canvas version";
      description: "Creates a new draft canvas version from the live canvas";
      tags: "CanvasVersion";
    };
  }

  rpc ListCanvasVersions(ListCanvasVersionsRequest) returns (ListCanvasVersionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/versions"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvas versions";
      description: "Lists all versions for a canvas";
      tags: "CanvasVersion";
    };
  }

  rpc DescribeCanvasVersion(DescribeCanvasVersionRequest) returns (DescribeCanvasVersionResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/versions/{version_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Describe canvas version";
      description: "Returns one canvas version by ID";
      tags: "CanvasVersion";
    };
  }

  rpc DeleteCanvasVersion(DeleteCanvasVersionRequest) returns (DeleteCanvasVersionResponse) {
    option (google.api.http) = {
      delete: "/api/v1/canvases/{canvas_id}/versions/{version_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Discard draft canvas version";
      description: "Discards a user-owned draft canvas version";
      tags: "CanvasVersion";
    };
  }

  rpc PublishCanvasVersion(PublishCanvasVersionRequest) returns (PublishCanvasVersionResponse) {
    option (google.api.http) = {
      patch: "/api/v1/canvases/{canvas_id}/versions/{version_id}/publish"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Publish draft canvas version";
      description: "Publishes a user-owned draft canvas version directly to live";
      tags: "CanvasVersion";
    };
  }

  rpc DiscardCanvasStaging(DiscardCanvasStagingRequest) returns (DiscardCanvasStagingResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/versions/{version_id}/staging/discard"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Discard canvas staging";
      description: "Discards staged spec changes for a draft version; omit paths to discard all staged files";
      tags: "CanvasVersion";
    };
  }

  rpc CommitCanvasStaging(CommitCanvasStagingRequest) returns (CommitCanvasStagingResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/versions/{version_id}/staging/commit"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Commit canvas staging";
      description: "Parses staged canvas.yaml and console.yaml into the draft version and clears staging";
      tags: "CanvasVersion";
    };
  }

  rpc ApplyCanvasAutoLayout(ApplyCanvasAutoLayoutRequest) returns (ApplyCanvasAutoLayoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/versions/{version_id}/staging/auto-layout"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Apply canvas auto-layout";
      description: "Lays out the staged canvas.yaml for a draft version and re-stages the positioned result";
      tags: "CanvasVersion";
    };
  }

  rpc DeleteCanvas(DeleteCanvasRequest) returns (DeleteCanvasResponse) {
    option (google.api.http) = {
      delete: "/api/v1/canvases/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete canvas";
      description: "Deletes an existing canvas";
      tags: "Canvas";
    };
  }

  rpc ListNodeQueueItems(ListNodeQueueItemsRequest) returns (ListNodeQueueItemsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/queue"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List items in a node's queue";
      description: "Returns a list of items in a node's queue";
      tags: "CanvasNode";
    };
  }

  rpc DeleteNodeQueueItem(DeleteNodeQueueItemRequest) returns (DeleteNodeQueueItemResponse) {
    option (google.api.http) = {
      delete: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/queue/{item_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete item from a node's queue";
      description: "Deletes a specific item in a node's queue";
      tags: "CanvasNode";
    };
  }

  rpc ListNodeExecutions(ListNodeExecutionsRequest) returns (ListNodeExecutionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/executions"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List node executions";
      description: "Returns a list of executions for a specific canvas node";
      tags: "CanvasNode";
    };
  }

  rpc ListNodeEvents(ListNodeEventsRequest) returns (ListNodeEventsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/nodes/{node_id}/events"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List node events";
      description: "Returns a list of events for a specific canvas node";
      tags: "CanvasNode";
    };
  }

  rpc ReemitTriggerEvent(ReemitTriggerEventRequest) returns (ReemitTriggerEventResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/triggers/{node_id}/events/{event_id}/reemit"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Re-emit trigger event";
      description: "Re-emits an existing root event from a trigger node";
      tags: "CanvasNode";
    };
  }

  rpc InvokeNodeExecutionHook(InvokeNodeExecutionHookRequest) returns (InvokeNodeExecutionHookResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/executions/{execution_id}/hooks/{hook_name}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Invoke execution hook";
      description: "Invokes a custom hook on a canvas node execution";
      tags: "CanvasNodeExecution";
    };
  }

  rpc InvokeNodeTriggerHook(InvokeNodeTriggerHookRequest) returns (InvokeNodeTriggerHookResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/triggers/{node_id}/hooks/{hook_name}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Invoke trigger hook";
      description: "Invokes a custom hook on a canvas node trigger";
      tags: "CanvasNode";
    };
  }

  rpc CancelExecution(CancelExecutionRequest) returns (CancelExecutionResponse) {
    option (google.api.http) = {
      patch: "/api/v1/canvases/{canvas_id}/executions/{execution_id}/cancel"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Cancel execution";
      description: "Cancels a running canvas node execution";
      tags: "CanvasNodeExecution";
    };
  }

  rpc ResolveExecutionErrors(ResolveExecutionErrorsRequest) returns (ResolveExecutionErrorsResponse) {
    option (google.api.http) = {
      patch: "/api/v1/canvases/{canvas_id}/executions/resolve"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Resolve execution errors";
      description: "Marks canvas node execution errors as resolved";
      tags: "CanvasNodeExecution";
    };
  }

  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/runs"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvas runs";
      description: "Returns a list of runs for a canvas";
      tags: "CanvasRun";
    };
  }

  rpc DescribeRun(DescribeRunRequest) returns (DescribeRunResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/runs/{run_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Describe a run";
      description: "Returns a description of a run";
      tags: "CanvasRun";
    };
  }

  rpc ListCanvasMemories(ListCanvasMemoriesRequest) returns (ListCanvasMemoriesResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/memory"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List canvas memories";
      description: "Returns append-only memory records for a canvas";
      tags: "Canvas";
    };
  }

  rpc DeleteCanvasMemory(DeleteCanvasMemoryRequest) returns (DeleteCanvasMemoryResponse) {
    option (google.api.http) = {
      delete: "/api/v1/canvases/{canvas_id}/memory/{memory_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete canvas memory entry";
      description: "Deletes one memory record by ID from a canvas";
      tags: "Canvas";
    };
  }

  rpc CreateCanvasMemoryNamespace(CreateCanvasMemoryNamespaceRequest) returns (CreateCanvasMemoryNamespaceResponse) {
    option (google.api.http) = {
      post: "/api/v1/canvases/{canvas_id}/memory/namespaces"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create manual canvas memory namespace";
      description: "Creates a manually-managed memory namespace with the provided entries. Rejected if the namespace already has any entries.";
      tags: "Canvas";
    };
  }

  rpc UpdateCanvasMemoryNamespace(UpdateCanvasMemoryNamespaceRequest) returns (UpdateCanvasMemoryNamespaceResponse) {
    option (google.api.http) = {
      put: "/api/v1/canvases/{canvas_id}/memory/namespaces/{namespace}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update manual canvas memory namespace";
      description: "Replaces the entries of a manually-managed memory namespace, optionally renaming it. Rejected if the namespace is node-managed.";
      tags: "Canvas";
    };
  }

  rpc ListEventExecutions(ListEventExecutionsRequest) returns (ListEventExecutionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/canvases/{canvas_id}/events/{event_id}/executions"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List event executions";
      description: "Returns a list of all node executions triggered by a root event";
      tags: "CanvasEvent";
    };
  }

}

message ListCanvasesRequest {
}

message ListCanvasesResponse {
  repeated CanvasSummary canvases = 1;
}

message DescribeCanvasRequest {
  string id = 1;
}

message DescribeCanvasResponse {
  Canvas canvas = 1;
}

message UpdateCanvasRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
}

message UpdateCanvasResponse {
  Canvas canvas = 1;
}

message CreateCanvasRequest {
  Canvas canvas = 1;
  CanvasAutoLayout auto_layout = 2;
}

message CreateCanvasResponse {
  Canvas canvas = 1;
}

message CanvasAutoLayout {
  enum Algorithm {
    ALGORITHM_UNSPECIFIED = 0;
    ALGORITHM_HORIZONTAL = 1;
  }

  enum Scope {
    SCOPE_UNSPECIFIED = 0;
    SCOPE_FULL_CANVAS = 1;
    SCOPE_CONNECTED_COMPONENT = 2;
  }

  Algorithm algorithm = 1;
  repeated string node_ids = 2;
  Scope scope = 3;
}

message CanvasRepository {
  message Metadata {
    string canvas_id = 1;
    google.protobuf.Timestamp updated_at = 7;
  }

  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_PENDING = 1;
    STATE_READY = 2;
    STATE_ERROR = 3;
  }

  message Status {
    State state = 1;
    string head_sha = 2;
    optional string error = 3;
  }

  Metadata metadata = 1;
  Status status = 2;
}

message GetCanvasRepositoryRequest {
  string canvas_id = 1;
}

message GetCanvasRepositoryResponse {
  CanvasRepository repository = 1;
}

message ListCanvasRepositoryFilesRequest {
  string canvas_id = 1;
}

message CanvasRepositoryFile {
  string path = 1;
}

message ListCanvasRepositoryFilesResponse {
  repeated CanvasRepositoryFile files = 1;
}

message CanvasRepositoryFileOperation {
  string path = 1;
  bytes content = 2;
  bool delete = 3;
}

message CommitCanvasRepositoryFilesRequest {
  string canvas_id = 1;
  string expected_head_sha = 2;
  string message = 3;
  repeated CanvasRepositoryFileOperation operations = 4;
  // Draft version to update when committing canvas.yaml or console.yaml.
  optional string version_id = 5;
  // When set, applies auto-layout while processing canvas.yaml updates.
  optional CanvasAutoLayout auto_layout = 6;
}

message CommitCanvasRepositoryFilesResponse {
  string commit_sha = 1;
}

message StageCanvasRepositoryFileRequest {
  string canvas_id = 1;
  string version_id = 2;
  // canvas.yaml/console.yaml additions, updates, or deletions to stage verbatim.
  repeated CanvasRepositoryFileOperation operations = 3;
}

message StageCanvasRepositoryFileResponse {
  StagingSummary staging_summary = 1;
}

message CreateCanvasVersionRequest {
  string canvas_id = 1;
  optional string display_name = 2;
}

message CreateCanvasVersionResponse {
  CanvasVersion version = 1;
}

message ListCanvasVersionsRequest {
  string canvas_id = 1;
  uint32 limit = 2;
  google.protobuf.Timestamp before = 3;
  CanvasVersion.State state = 4;
}

message ListCanvasVersionsResponse {
  repeated CanvasVersion versions = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message DescribeCanvasVersionRequest {
  string canvas_id = 1;
  string version_id = 2;
}

message DescribeCanvasVersionResponse {
  // Version metadata only; workflow content is read via the repository files API
  // (use ?stage=true on the file GET to read effective staged content).
  CanvasVersion version = 1;
  // Populated for draft versions to drive uncommitted/ready-to-publish indicators.
  StagingSummary staging_summary = 2;
}

// StagingSummary reports the uncommitted spec edits held in workflow_staged_files for a draft version.
message StagingSummary {
  bool has_staging = 1;
  repeated string staged_paths = 2;
  optional string base_version_id = 3;
}

message DeleteCanvasVersionRequest {
  string canvas_id = 1;
  string version_id = 2;
}

message DeleteCanvasVersionResponse {}

message PublishCanvasVersionRequest {
  string canvas_id = 1;
  string version_id = 2;
}

message PublishCanvasVersionResponse {
  CanvasVersion version = 1;
}

message DiscardCanvasStagingRequest {
  string canvas_id = 1;
  string version_id = 2;
  // Optional per-file revert. When empty, all staged files are discarded.
  repeated string paths = 3;
}

message DiscardCanvasStagingResponse {
  StagingSummary staging_summary = 1;
}

message CommitCanvasStagingRequest {
  string canvas_id = 1;
  string version_id = 2;
}

message CommitCanvasStagingResponse {
  CanvasVersion version = 1;
  StagingSummary staging_summary = 2;
}

message ApplyCanvasAutoLayoutRequest {
  string canvas_id = 1;
  string version_id = 2;
  CanvasAutoLayout auto_layout = 3;
}

message ApplyCanvasAutoLayoutResponse {
  StagingSummary staging_summary = 1;
}

message DeleteCanvasRequest {
  string id = 1;
}

message DeleteCanvasResponse {}

message UserRef {
  string id = 1;
  string name = 2;
}

message CanvasSummary {
  message Node {
    string id = 1;
    Components.Position position = 2;
  }

  string id = 1;
  string name = 2;
  string description = 3;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  UserRef created_by = 7;
  string folder_id = 8;
  repeated Node nodes = 9;
  repeated Components.Edge edges = 10;
}

message Canvas {
  message Metadata {
    string id = 1;
    string organization_id = 2;
    string name = 3;
    string description = 4;
    google.protobuf.Timestamp created_at = 5;
    google.protobuf.Timestamp updated_at = 6;
    UserRef created_by = 7;
    string folder_id = 8;
  }

  message Spec {
    repeated Components.Node nodes = 1;
    repeated Components.Edge edges = 2;
  }

  message Status {
    repeated CanvasNodeExecution last_executions = 1;
    repeated CanvasEvent last_events = 2;
  }

  Metadata metadata = 1;
  Spec spec = 2;
  Status status = 3;
}

message CanvasVersion {
  enum State {
    STATE_UNSPECIFIED = 0;
    STATE_DRAFT = 1;
    STATE_PUBLISHED = 2;
    STATE_SNAPSHOT = 3;
  }

  message Metadata {
    string id = 1;
    string canvas_id = 2;
    UserRef owner = 3;
    State state = 4;
    google.protobuf.Timestamp published_at = 5;
    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
    string name = 8;
    string description = 9;
    string branch_name = 10;
    string display_name = 11;
  }

  Metadata metadata = 1;
  Canvas.Spec spec = 2;
}

message ListNodeEventsRequest {
  string canvas_id = 1;
  string node_id = 2;
  uint32 limit = 3;
  google.protobuf.Timestamp before = 4;
}

message ListNodeEventsResponse {
  repeated CanvasEvent events = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message ReemitTriggerEventRequest {
  string canvas_id = 1;
  string node_id = 2;
  string event_id = 3;
}

message ReemitTriggerEventResponse {
  string event_id = 1;
}

message ListNodeQueueItemsRequest {
  string canvas_id = 1;
  string node_id = 2;
  uint32 limit = 3;
  google.protobuf.Timestamp before = 4;
}

message ListNodeQueueItemsResponse {
  repeated CanvasNodeQueueItem items = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

message DeleteNodeQueueItemRequest {
  string canvas_id = 1;
  string node_id = 2;
  string item_id = 3;
}

message DeleteNodeQueueItemResponse {}

message ListNodeExecutionsRequest {
  string canvas_id = 1;
  string node_id = 2;
  repeated CanvasNodeExecution.State states = 3;
  repeated CanvasNodeExecution.Result results = 4;
  uint32 limit = 5;
  google.protobuf.Timestamp before = 6;
}

message ListNodeExecutionsResponse {
  repeated CanvasNodeExecution executions = 1;
  uint32 total_count = 2;
  bool has_next_page = 3;
  google.protobuf.Timestamp last_timestamp = 4;
}

//
// More succint description of a canvas node execution.
// No input, outputs, or root event.
// Used to embed execution information into other messages.
//
message CanvasNodeExecutionRef {
  string id = 1;
  string node_id = 2;
  CanvasNodeExecution.State state = 3;
  CanvasNodeExecution.Result result = 4;
  CanvasNodeExecution.ResultReason result_reason = 5;
  string result_message = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

//
// Full description of a canvas node execution.
// Should only be used for endpoints specific to executions.
//
message CanvasNodeExecution {
  enum State {
    STATE_UNKNOWN = 0;
    STATE_PENDING = 1;
    STATE_STARTED = 2;
    STATE_FINISHED = 3;
  }

  enum Result {
    RESULT_UNKNOWN = 0;
    RESULT_PASSED = 1;
    RESULT_FAILED = 2;
    RESULT_CANCELLED = 3;
  }

  enum ResultReason {
    RESULT_REASON_OK = 0;
    RESULT_REASON_ERROR = 1;
    RESULT_REASON_ERROR_RESOLVED = 2;
  }

  string id = 1;
  string canvas_id = 2;
  string node_id = 3;
  string previous_execution_id = 4;
  State state = 5;
  Result result = 6;
  ResultReason result_reason = 7;
  string result_message = 8;
  google.protobuf.Struct outputs = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Struct metadata = 12;
  google.protobuf.Struct configuration = 13;
