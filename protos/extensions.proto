syntax = "proto3";

package Superplane.Extensions;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/superplanehq/superplane/pkg/protos/extensions";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Superplane Extensions API";
    version: "1.0";
    description: "API for Superplane Extensions";
    contact: {
      name: "API Support";
      email: "support@superplane.com";
    };
  };
  schemes: HTTP;
  schemes: HTTPS;
  consumes: "application/json";
  produces: "application/json";
};

service Extensions {
  rpc ListExtensions(ListExtensionsRequest) returns (ListExtensionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/extensions"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List extensions";
      description: "Returns a list of all extensions";
      tags: "Extension";
    };
  }

  rpc CreateExtension(CreateExtensionRequest) returns (CreateExtensionResponse) {
    option (google.api.http) = {
      post: "/api/v1/extensions"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a new extension";
      description: "Creates a new extension";
      tags: "Extension";
    };
  }

  rpc CreateVersion(CreateVersionRequest) returns (CreateVersionResponse) {
    option (google.api.http) = {
      post: "/api/v1/extensions/{extension}/versions"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Creates a new version of an extension";
      description: "Creates a new version of an extension";
      tags: "Extension";
    };
  }

  rpc UpdateVersion(UpdateVersionRequest) returns (UpdateVersionResponse) {
    option (google.api.http) = {
      put: "/api/v1/extensions/{extension}/versions/{version}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Updates the version of an extension";
      description: "Updates the version of an extension";
      tags: "Extension";
    };
  }

  rpc PublishVersion(PublishVersionRequest) returns (PublishVersionResponse) {
    option (google.api.http) = {
      post: "/api/v1/extensions/{extension}/versions/{version}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Publishes a draft version of an extension";
      description: "Publishes a draft version of an extension";
      tags: "Extension";
    };
  }

  rpc ListVersions(ListVersionsRequest) returns (ListVersionsResponse) {
    option (google.api.http) = {
      get: "/api/v1/extensions/{extension}/versions"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List versions of an extension";
      description: "Returns a list of all versions for an extension";
      tags: "Extension";
    };
  }
}

message ListExtensionsRequest {
  string organization_id = 1;
}

message ListExtensionsResponse {
  repeated Extension extensions = 1;
}

message CreateExtensionRequest {
  string name = 1;
  string description = 2;
}

message CreateExtensionResponse {
  Extension extension = 1;
}

message CreateVersionRequest {
  string extension = 1;
  string version = 2;
  bytes bundle = 3;
  string digest = 4;
}

message CreateVersionResponse {
  ExtensionVersion version = 1;
}

message UpdateVersionRequest {
  string extension = 1;
  string version = 2;
  bytes bundle = 3;
  string digest = 4;
}

message UpdateVersionResponse {
  ExtensionVersion version = 1;
}

message PublishVersionRequest {
  string extension = 1;
  string version = 2;
}

message PublishVersionResponse {
  ExtensionVersion version = 1;
}

message ListVersionsRequest {
  string extension = 1;
}

message ListVersionsResponse {
  repeated ExtensionVersion versions = 1;
}

message Extension {
  message Metadata {
    string id = 1;
    string name = 2;
    string description = 3;
    google.protobuf.Timestamp created_at = 4;
  }

  Metadata metadata = 1;
}

message ExtensionVersion {
  message Metadata {
    string id = 1;
    string version = 2;
    google.protobuf.Timestamp created_at = 3;
    google.protobuf.Timestamp updated_at = 4;
  }

  enum State {
    STATE_DRAFT = 0;
    STATE_PUBLISHED = 1;
  }

  message Status {
    State state = 1;
  }

  Metadata metadata = 1;
  Status status = 2;
}
