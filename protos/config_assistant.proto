syntax = "proto3";

package Superplane.ConfigAssistant;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/superplanehq/superplane/pkg/protos/config_assistant";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SuperPlane Config Assistant API";
    version: "1.0";
    description: "API for inline workflow configuration field assistance";
    contact: {
      name: "API Support";
      email: "support@superplane.com";
    };
  };
  schemes: HTTPS;
  schemes: HTTP;
  consumes: "application/json";
  produces: "application/json";
};

service ConfigAssistant {
  rpc SuggestConfigurationField(SuggestConfigurationFieldRequest) returns (SuggestConfigurationFieldResponse) {
    option (google.api.http) = {
      post: "/api/v1/agents/suggest-field"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Suggest a value for a configuration field";
      description: "Uses the AI config assistant to propose a field value from context and a natural-language instruction.";
      tags: "Agent";
    };
  }
}

message SuggestConfigurationFieldRequest {
  string canvas_id = 1;
  string node_id = 2;
  string instruction = 3;
  // JSON blob: field metadata, current value, autocompleteExampleObj, etc.
  string field_context_json = 4;
}

message SuggestConfigurationFieldResponse {
  string value = 1;
  string explanation = 2;
}
