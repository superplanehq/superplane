syntax = "proto3";

package Superplane.Agents;

import "google/protobuf/timestamp.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/superplanehq/superplane/pkg/protos/agents";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "SuperPlane Agents API";
    version: "1.0";
    description: "API for SuperPlane agent sessions";
    contact: {
      name: "API Support";
      email: "support@superplane.com";
    };
  };
  schemes: HTTPS;
  schemes: HTTP;
  consumes: "application/json";
  produces: "application/json";
};

service Agents {
  rpc GetCanvasAgentChat(GetCanvasAgentChatRequest) returns (GetCanvasAgentChatResponse) {
    option (google.api.http) = {
      get: "/api/v1/agents/canvases/{canvas_id}/chat"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get or create the user's chat for a canvas";
      description: "Returns the user's single chat session for the given canvas, provisioning it on first call. The session is permanent.";
      tags: "Agent";
    };
  }

  rpc ResetCanvasAgentChat(ResetCanvasAgentChatRequest) returns (ResetCanvasAgentChatResponse) {
    option (google.api.http) = {
      post: "/api/v1/agents/canvases/{canvas_id}/chat/reset"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Reset the user's chat for a canvas";
      description: "Deletes the current chat session and messages, then provisions a brand-new session. Used by the `/clear` command.";
      tags: "Agent";
    };
  }

  rpc ListAgentChatMessages(ListAgentChatMessagesRequest) returns (ListAgentChatMessagesResponse) {
    option (google.api.http) = {
      get: "/api/v1/agents/chats/{chat_id}/messages"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List messages older than a cursor";
      description: "Returns up to `limit` messages strictly older than `before_id`, oldest-first. Omit `before_id` to fetch the most recent page.";
      tags: "Agent";
    };
  }

  rpc SendAgentChatMessage(SendAgentChatMessageRequest) returns (SendAgentChatMessageResponse) {
    option (google.api.http) = {
      post: "/api/v1/agents/chats/{chat_id}/messages"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Send a user message to the chat";
      description: "Persists the user message, forwards it to the upstream provider, and triggers an async stream of assistant events broadcast over the chat's websocket topic.";
      tags: "Agent";
    };
  }

  rpc InterruptAgentChat(InterruptAgentChatRequest) returns (InterruptAgentChatResponse) {
    option (google.api.http) = {
      post: "/api/v1/agents/chats/{chat_id}/interrupt"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Interrupt agent execution";
      description: "Sends a user.interrupt event to stop the agent mid-execution.";
      tags: "Agent";
    };
  }

  rpc DefineAgentOutcome(DefineAgentOutcomeRequest) returns (DefineAgentOutcomeResponse) {
    option (google.api.http) = {
      post: "/api/v1/agents/chats/{chat_id}/outcome"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Define outcome for agent";
      description: "Sends a user.define_outcome event with a rubric. The agent works toward the rubric with a grader evaluating each iteration.";
      tags: "Agent";
    };
  }
}

enum AgentMode {
  MODE_UNSPECIFIED = 0;
  MODE_BUILDER = 1;
  MODE_OPERATOR = 2;
  MODE_ARCHITECT = 3;
}

message GetCanvasAgentChatRequest {
  string canvas_id = 1;
}

message GetCanvasAgentChatResponse {
  AgentChatInfo chat = 1;
}

message ResetCanvasAgentChatRequest {
  string canvas_id = 1;
}

message ResetCanvasAgentChatResponse {
  AgentChatInfo chat = 1;
}

message ListAgentChatMessagesRequest {
  string chat_id = 1;
  string before_id = 2;
  int32 limit = 3;
}

message ListAgentChatMessagesResponse {
  repeated AgentChatMessage messages = 1;
  bool has_more = 2;
}

message SendAgentChatMessageRequest {
  string chat_id = 1;
  string content = 2;
  AgentMode mode = 3;
  repeated AgentChatImage images = 4;
  bool auto_layout_on_update_enabled = 5;
}

enum AgentChatImageMediaType {
  MEDIA_TYPE_UNSPECIFIED = 0;
  MEDIA_TYPE_PNG = 1;
  MEDIA_TYPE_JPEG = 2;
  MEDIA_TYPE_GIF = 3;
  MEDIA_TYPE_WEBP = 4;
}

message AgentChatImage {
  AgentChatImageMediaType media_type = 1;
  bytes data = 2;
}

message SendAgentChatMessageResponse {
  AgentChatMessage message = 1;
}

message InterruptAgentChatRequest {
  string chat_id = 1;
}

message InterruptAgentChatResponse {}

message DefineAgentOutcomeRequest {
  string chat_id = 1;
  string description = 2;
  string rubric = 3;
  int32 max_iterations = 4;
}

message DefineAgentOutcomeResponse {}

message AgentChatInfo {
  string id = 1;
  string canvas_id = 2;
  string provider = 3;
  string status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message AgentChatMessage {
  string id = 1;
  string role = 2;
  string content = 3;
  string tool_call_id = 4;
  string tool_name = 5;
  string tool_status = 6;
  google.protobuf.Timestamp created_at = 7;
  repeated AgentChatImage images = 8;
}

message AgentRunFinishedMessage {
  string organization_id = 1;
  string chat_id = 2;
  string model = 3;
  int64 input_tokens = 4;
  int64 output_tokens = 5;
  int64 total_tokens = 6;
  int64 cache_read_tokens = 7;
  int64 cache_write_tokens = 8;
  string idempotency_key = 9;
  string session_id = 10;
}
