syntax = "proto3";

package Superplane.Components;

import "google/protobuf/struct.proto";

option go_package = "github.com/superplanehq/superplane/pkg/protos/components";

message Node {
  enum Type {
    TYPE_ACTION = 0;
    TYPE_BLUEPRINT = 1;
    TYPE_TRIGGER = 2;
    TYPE_WIDGET = 3;
  }

  message ActionRef {
    string name = 1;
  }

  message TriggerRef {
    string name = 1;
  }

  message WidgetRef {
    string name = 1;
  }

  message BlueprintRef {
    string id = 1;
  }

  string id = 1;
  string name = 2;
  Type type = 3;
  google.protobuf.Struct configuration = 4;
  optional google.protobuf.Struct metadata = 5;
  Position position = 6;
  optional ActionRef action = 7;
  optional BlueprintRef blueprint = 8;
  optional TriggerRef trigger = 9;
  optional WidgetRef widget = 10;
  bool is_collapsed = 11;
  optional IntegrationRef integration = 12;
  optional string error_message = 13;
  optional string warning_message = 14;
  bool paused = 15;
}

message Position {
  int32 x = 1;
  int32 y = 2;
}

message Edge {
  string source_id = 1;
  string target_id = 2;
  string channel = 3;
}

message IntegrationRef {
  optional string id = 1;
  optional string name = 2;
}
