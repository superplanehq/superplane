version: v1.0
name: CI
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204
auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch != 'main'
blocks:
  - name: "License Check"
    dependencies: []
    task:
      prologue:
        commands:
          - checkout
      jobs:
        - name: Licence Check
          commands:
            - make test.license.check

  - name: "Backend Tests"
    dependencies: []
    task:
      env_vars:
        - name: DOCKER_BUILDKIT
          value: "1"
      prologue:
        commands:
          - checkout
          - mkdir -p tmp/go tmp/go-build
          - "cache restore go-mod-$SEMAPHORE_GIT_BRANCH-$(checksum go.sum),go-mod-$SEMAPHORE_GIT_BRANCH,go-mod"
          - "cache restore go-build-$SEMAPHORE_GIT_BRANCH-$(checksum go.sum),go-build-$SEMAPHORE_GIT_BRANCH,go-build"
          - make test.setup.build
          - make test.setup.db
          - make test.start
      jobs:
        - name: Lint
          commands:
            - make lint
        - name: Unit Tests
          commands:
            - make test.coverage
        - name: E2E Tests
          parallelism: 10
          commands:
            - make test.e2e.autoparallel INDEX=$SEMAPHORE_JOB_INDEX TOTAL=$SEMAPHORE_JOB_COUNT
        - name: "Check: DB structure"
          commands:
            - make check.db.structure
            - make check.db.migrations
        - name: "Check: Components Docs"
          commands:
            - make gen.components.docs
            - git diff --exit-code docs/components
        - name: "Check: Go Format"
          commands:
            - make format.go.check
      epilogue:
        always:
          commands:
            - "[ -f junit-report.xml ] && test-results publish junit-report.xml"
            - "if [ -d tmp/screenshots ] && ls tmp/screenshots/**/*.png >/dev/null 2>&1; then artifact push job tmp/screenshots; fi"
            - "cache store go-mod-$SEMAPHORE_GIT_BRANCH-$(checksum go.sum) tmp/go"
            - "cache store go-build-$SEMAPHORE_GIT_BRANCH-$(checksum go.sum) tmp/go-build"

  - name: "Agent Tests"
    dependencies: []
    task:
      env_vars:
        - name: DOCKER_BUILDKIT
          value: "1"
      prologue:
        commands:
          - checkout
          - make test.agent.setup
      jobs:
        - name: Unit Tests
          commands:
            - make test.agent.unit AGENT_TEST_TARGETS="tests --junitxml=junit-report.xml"
        - name: Lint
          commands:
            - make -C agent lint
        - name: Format Check
          commands:
            - make -C agent format.check
        - name: Type Check
          commands:
            - make -C agent typecheck
      epilogue:
        always:
          commands:
            - "[ -f agent/junit-report.xml ] && test-results publish agent/junit-report.xml"

  - name: "Frondend Tests"
    dependencies: []
    task:
      prologue:
        commands:
          - checkout
          - sem-version node 20
      jobs:
        - name: Unit Tests
          commands:
            - "cache restore node-modules-$SEMAPHORE_GIT_BRANCH-$(checksum web_src/package-lock.json),node-modules-$SEMAPHORE_GIT_BRANCH,node-modules"
            - cd web_src
            - npm ci
            - cache store node-modules-$SEMAPHORE_GIT_BRANCH-$(checksum package-lock.json) node_modules
            - "npm run test:coverage"
        - name: Format Check
          commands:
            - "cache restore node-modules-$SEMAPHORE_GIT_BRANCH-$(checksum web_src/package-lock.json),node-modules-$SEMAPHORE_GIT_BRANCH,node-modules"
            - cd web_src && npm ci && cd ..
            - make format.js.check
        - name: EsLint
          commands:
            - "cache restore node-modules-$SEMAPHORE_GIT_BRANCH-$(checksum web_src/package-lock.json),node-modules-$SEMAPHORE_GIT_BRANCH,node-modules"
            - cd web_src
            - npm ci
            - cache store node-modules-$SEMAPHORE_GIT_BRANCH-$(checksum package-lock.json) node_modules
            - npm run lint:budget
        - name: Knip (dead files check)
          commands:
            - "cache restore node-modules-$SEMAPHORE_GIT_BRANCH-$(checksum web_src/package-lock.json),node-modules-$SEMAPHORE_GIT_BRANCH,node-modules"
            - cd web_src
            - npm ci
            - cache store node-modules-$SEMAPHORE_GIT_BRANCH-$(checksum package-lock.json) node_modules
            - npm run lint:knip

after_pipeline:
  task:
    jobs:
      - name: Submit Reports
        commands:
          - test-results gen-pipeline-report
