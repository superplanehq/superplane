version: v1.0
name: CI
agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

global_job_config:
  env_vars:
    - name: DOCKER_BUILDKIT
      value: "1"
  prologue:
    commands:
      - checkout
      - mkdir -p tmp/go tmp/go-build
      - "cache restore go-mod-$SEMAPHORE_GIT_BRANCH-$(checksum go.sum),go-mod-$SEMAPHORE_GIT_BRANCH,go-mod"
      - "cache restore go-build-$SEMAPHORE_GIT_BRANCH-$(checksum go.sum),go-build-$SEMAPHORE_GIT_BRANCH,go-build"
      - make dev.up
      - make dev.setup

auto_cancel:
  running:
    when: branch != 'main'
  queued:
    when: branch != 'main'
blocks:
  - name: "Backend Tests"
    dependencies: []
    run:
      when: "change_in('/', {exclude: ['/docs/**', '**/*.md', '**/*.mdx'], default_branch: 'main'})"
    task:
      jobs:
        - name: Lint
          commands:
            - make lint

        - name: Unit Tests
          commands:
            - make test.coverage.check

        - name: E2E Tests
          parallelism: 10
          commands:
            - make test.e2e.autoparallel INDEX=$SEMAPHORE_JOB_INDEX TOTAL=$SEMAPHORE_JOB_COUNT

        - name: Checks
          commands:
            - make check.db.structure
            - make check.db.migrations
            - make check.components.docs
            - make check.format.go
            - make check.example.payloads
            - make check.configuration.fields
            - make check.grpc.actions.status
            - make check.models.tx.debt
            - make check.generated.artifacts

      epilogue:
        always:
          commands:
            - "[ -f junit-report.xml ] && test-results publish junit-report.xml"
            - "if [ -d tmp/screenshots ] && ls tmp/screenshots/**/*.png >/dev/null 2>&1; then artifact push job tmp/screenshots; fi"
            - "cache store go-mod-$SEMAPHORE_GIT_BRANCH-$(checksum go.sum) tmp/go"
            - "cache store go-build-$SEMAPHORE_GIT_BRANCH-$(checksum go.sum) tmp/go-build"

  - name: "Frontend Tests"
    dependencies: []
    run:
      when: "change_in('/', {exclude: ['/docs/**', '**/*.md', '**/*.mdx'], default_branch: 'main'})"
    task:
      jobs:
        - name: Check Build
          commands:
            - make check.build.ui

        - name: Storybook Build
          commands:
            - make check.build.storybook

        - name: Unit Tests
          parallelism: 4
          commands:
            - make check.test.ui.shard INDEX=$SEMAPHORE_JOB_INDEX TOTAL=$SEMAPHORE_JOB_COUNT

        - name: Format Check
          commands:
            - make check.format.js

        - name: EsLint
          commands:
            - make check.lint.ui

        - name: Knip (dead files check)
          commands:
            - make check.lint.ui.knip

after_pipeline:
  task:
    jobs:
      - name: Submit Reports
        commands:
          - test-results gen-pipeline-report
