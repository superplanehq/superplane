version: v1.0
name: "Superplane Release Pipeline"

agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

global_job_config:
  env_vars:
    - name: DOCKER_BUILDKIT
      value: "1"

  secrets:
    - name: ghcr-push-token

  prologue:
    commands:
      - git clone https://github.com/superplanehq/superplane.git
      - cd superplane
      - touch agent/.env
      - |
        if git show-ref --verify --quiet refs/heads/$REL_VERSION || git show-ref --verify --quiet refs/tags/$REL_VERSION; then
          git checkout $REL_VERSION
        else
          git checkout -b $REL_VERSION
        fi
      - |
        cat <<EOF > release-metadata.json
        {
          "version": "$REL_VERSION",
          "commit": "$(git rev-parse HEAD)",
          "date": "$(date -Iseconds)",
          "workflow_id": "$SEMAPHORE_WORKFLOW_ID"
        }
        EOF

      - echo "$GHCR_PUSH_TOKEN" | docker login ghcr.io -u superplanehq --password-stdin
      - echo "$GHCR_PUSH_TOKEN" | helm registry login ghcr.io -u superplanehq --password-stdin

blocks:
  - name: "Docker Images amd64"
    dependencies: []
    task:
      env_vars:
        - name: REL_ARCH
          value: "amd64"

      agent:
        machine:
          type: f1-standard-2
          os_image: ubuntu2204

      jobs:
        - name: "SuperPlane Demo Image"
          commands:
            - bash release/superplane-demo-image/build.sh $REL_VERSION $REL_ARCH

        - name: "SuperPlane Image"
          commands:
            - bash release/superplane-image/build.sh $REL_VERSION $REL_ARCH

  - name: "Docker Images arm64"
    dependencies: []
    task:
      env_vars:
        - name: REL_ARCH
          value: "arm64"

      agent:
        machine:
          type: r1-standard-4
          os_image: ubuntu2404

      jobs:
        - name: "SuperPlane Demo Image"
          commands:
            - bash release/superplane-demo-image/build.sh $REL_VERSION $REL_ARCH

        - name: "SuperPlane Image"
          commands:
            - bash release/superplane-image/build.sh $REL_VERSION $REL_ARCH

  - name: "Build Multi-Platform Manifest"
    dependencies: ["Docker Images amd64", "Docker Images arm64"]
    task:
      jobs:
        - name: "SuperPlane Demo Image"
          commands:
            - docker manifest create $DEMO_IMAGE_REPO:$REL_VERSION $DEMO_IMAGE_REPO:$REL_VERSION-amd64 $DEMO_IMAGE_REPO:$REL_VERSION-arm64
            - docker manifest push $DEMO_IMAGE_REPO:$REL_VERSION

        - name: "SuperPlane Image"
          commands:
            - docker manifest create $STANDARD_IMAGE_REPO:$REL_VERSION $STANDARD_IMAGE_REPO:$REL_VERSION-amd64 $STANDARD_IMAGE_REPO:$REL_VERSION-arm64
            - docker manifest push $STANDARD_IMAGE_REPO:$REL_VERSION

  - name: "Verify Images"
    dependencies: ["Build Multi-Platform Manifest"]
    task:
      jobs:
        - name: "Verify GHCR Images"
          commands:
            - docker manifest inspect $STANDARD_IMAGE_REPO:$REL_VERSION
            - docker manifest inspect $DEMO_IMAGE_REPO:$REL_VERSION

  - name: "SuperPlane Helm Chart"
    dependencies: ["Verify Images"]
    task:
      jobs:
        - name: "SuperPlane Helm Chart"
          commands:
            - bash release/superplane-helm-chart/build.sh $REL_VERSION
