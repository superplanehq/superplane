version: v1.0
name: "Build and Push SuperPlane Dev Base Image"

agent:
  machine:
    type: f1-standard-2
    os_image: ubuntu2204

global_job_config:
  env_vars:
    - name: DOCKER_BUILDKIT
      value: "1"
    - name: DEV_BASE_IMAGE_REPO
      value: "ghcr.io/superplanehq/superplane-dev-base"

  secrets:
    - name: ghcr-push-token

  prologue:
    commands:
      - checkout
      - touch agent/.env
      - echo "$GHCR_PUSH_TOKEN" | docker login ghcr.io -u superplanehq --password-stdin

blocks:
  - name: "amd64 Image"
    dependencies: []
    task:
      agent:
        machine:
          type: f1-standard-2
          os_image: ubuntu2204

      jobs:
        - name: "Build"
          commands:
            - bash release/superplane-dev-base/build.sh "amd64"

  - name: "arm64 Image"
    dependencies: []
    task:
      agent:
        machine:
          type: r1-standard-4
          os_image: ubuntu2404

      jobs:
        - name: "Build"
          commands:
            - bash release/superplane-dev-base/build.sh "arm64"

  - name: "Build Multi-Platform Manifests"
    dependencies: ["amd64 Image", "arm64 Image"]
    task:
      jobs:
        - name: "Create and Push Manifests"
          commands:
            - docker manifest create "$DEV_BASE_IMAGE_REPO:app-latest" "$DEV_BASE_IMAGE_REPO:app-latest-amd64" "$DEV_BASE_IMAGE_REPO:app-latest-arm64"
            - docker manifest push "$DEV_BASE_IMAGE_REPO:app-latest"
            - docker manifest create "$DEV_BASE_IMAGE_REPO:agent-latest" "$DEV_BASE_IMAGE_REPO:agent-latest-amd64" "$DEV_BASE_IMAGE_REPO:agent-latest-arm64"
            - docker manifest push "$DEV_BASE_IMAGE_REPO:agent-latest"

  - name: "Verify Images"
    dependencies: ["Build Multi-Platform Manifests"]
    task:
      jobs:
        - name: "Verify GHCR Images"
          commands:
            - docker manifest inspect "$DEV_BASE_IMAGE_REPO:app-latest"
            - docker manifest inspect "$DEV_BASE_IMAGE_REPO:agent-latest"
